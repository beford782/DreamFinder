<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BC Search — Bel Furniture</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#9906;</span>
        <span class="logo-text">BC Search</span>
        <span class="logo-sub">Bel Furniture</span>
      </div>
      <div class="header-actions">
        <button id="historyToggle" class="btn-icon" title="Query History">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button id="testConnection" class="btn-outline" title="Test BC Connection">Test Connection</button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="layout">

    <!-- History Sidebar -->
    <aside id="historySidebar" class="sidebar hidden">
      <div class="sidebar-header">
        <h3>Query History</h3>
        <button id="clearHistory" class="btn-text">Clear</button>
      </div>
      <ul id="historyList" class="history-list"></ul>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Search Section -->
      <section id="searchSection" class="search-section">
        <h1 class="search-title">Ask anything about your business</h1>
        <p class="search-subtitle">Query your Business Central data using plain English</p>

        <form id="searchForm" class="search-form">
          <div class="search-bar">
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder='e.g. "What were our ten most popular SKUs last year?"'
              autocomplete="off"
              spellcheck="false"
            >
            <button type="submit" id="searchBtn" class="search-btn">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </div>
        </form>

        <!-- Suggested queries -->
        <div class="suggestions">
          <button class="chip" data-query="What were our top 10 best-selling items last year?">Top 10 SKUs</button>
          <button class="chip" data-query="Show me total sales by month for the past 12 months">Monthly sales trend</button>
          <button class="chip" data-query="Who are our top 5 customers by revenue this year?">Top customers</button>
          <button class="chip" data-query="Compare this quarter's sales to the same quarter last year">QoQ comparison</button>
          <button class="chip" data-query="What is our current inventory value by item category?">Inventory value</button>
          <button class="chip" data-query="Show me all outstanding customer balances over $10,000">Outstanding balances</button>
        </div>
      </section>

      <!-- Loading State -->
      <div id="loading" class="loading hidden">
        <div class="loading-spinner"></div>
        <p class="loading-text">Analyzing your question and querying Business Central...</p>
      </div>

      <!-- Error State -->
      <div id="errorState" class="error-state hidden">
        <div class="error-icon">!</div>
        <p id="errorMessage" class="error-message"></p>
        <button id="errorRetry" class="btn-outline">Try Again</button>
      </div>

      <!-- Results Dashboard -->
      <section id="dashboard" class="dashboard hidden">

        <!-- Results Header -->
        <div class="results-header">
          <div>
            <h2 id="resultsTitle" class="results-title"></h2>
            <p id="resultsDescription" class="results-description"></p>
          </div>
          <div class="results-actions">
            <button id="exportCsv" class="btn-outline btn-sm">Export CSV</button>
            <button id="exportPdf" class="btn-outline btn-sm">Export PDF</button>
            <button id="newQuery" class="btn-outline btn-sm">New Query</button>
          </div>
        </div>

        <!-- AI Summary -->
        <div id="summaryCard" class="summary-card hidden">
          <div class="summary-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          </div>
          <p id="summaryText" class="summary-text"></p>
        </div>

        <!-- KPI Cards -->
        <div id="kpiContainer" class="kpi-container hidden"></div>

        <!-- Chart -->
        <div id="chartContainer" class="chart-container hidden">
          <canvas id="resultChart"></canvas>
        </div>

        <!-- Data Table -->
        <div id="tableContainer" class="table-container hidden">
          <div class="table-controls">
            <input type="text" id="tableFilter" class="table-filter" placeholder="Filter results...">
            <span id="rowCount" class="row-count"></span>
          </div>
          <div class="table-scroll">
            <table id="dataTable" class="data-table">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div id="tablePagination" class="table-pagination"></div>
        </div>

        <!-- Record count -->
        <p id="resultsFooter" class="results-footer"></p>
      </section>

    </main>
  </div>

  <!-- Connection Test Modal -->
  <div id="connectionModal" class="modal hidden">
    <div class="modal-content">
      <h3>Connection Test</h3>
      <p id="connectionResult" class="connection-result">Testing...</p>
      <button id="closeModal" class="btn-outline">Close</button>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
